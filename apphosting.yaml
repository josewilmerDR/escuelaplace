# Firebase App Hosting config for the Next.js (SSR/ISR) app.
# Docs: https://firebase.google.com/docs/app-hosting/configure
#
# The NEXT_PUBLIC_* values are inlined into the client bundle at BUILD time, so each env
# entry is available at BUILD (and RUNTIME for SSR). They are public by design (see
# .env.local.example), but we still source them from Cloud Secret Manager so no real
# values live in git. Create each secret once with:
#   firebase apphosting:secrets:set NEXT_PUBLIC_FIREBASE_API_KEY
# (repeat per secret), then grant access when the CLI prompts.

runConfig:
  # Scale to zero when idle (cheap); cap instances to bound cost. Tune as traffic grows.
  minInstances: 0
  maxInstances: 2
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: NEXT_PUBLIC_FIREBASE_API_KEY
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    secret: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    secret: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    secret: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    secret: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: NEXT_PUBLIC_FIREBASE_APP_ID
    availability: [BUILD, RUNTIME]
  # NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID is omitted: it only exists when Google Analytics is
  # enabled, and Secret Manager rejects empty values. Add it back (as a secret with the real
  # G-XXXX value) if Analytics is turned on.
  - variable: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
    secret: NEXT_PUBLIC_GOOGLE_MAPS_API_KEY
    availability: [BUILD, RUNTIME]
  # Production must never point at the local emulators.
  - variable: NEXT_PUBLIC_USE_EMULATORS
    value: "false"
    availability: [BUILD, RUNTIME]
